name: nexus_trader
description: "Agentic AI Trading App for Trex Broker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Webview
  webview_flutter: ^4.4.0
  
  # UI/State
  provider: ^6.1.1
  cupertino_icons: ^1.0.2
  flutter_markdown: ^0.6.18

  # AI & Helper
  google_generative_ai: ^0.2.0
  flutter_dotenv: ^5.1.0
  mailer: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

